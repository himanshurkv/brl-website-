<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Balaji Roadlines</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div id="loader"></div>

<nav id="navbar">
  <div class="logo">BRL</div>
  <ul>
    <li><a href="#about">About</a></li>
    <li><a href="#stats">Stats</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

<section class="hero">
  <video autoplay muted loop playsinline class="hero-video">
    <source src="{{ url_for('static', filename='videos/hero-video.mp4') }}" type="video/mp4">
  </video>
  <div class="overlay"></div>
  <div class="hero-content">
    <h1>Balaji Roadlines</h1>
    <p>A Step Ahead in Logistics</p>
    <a href="#contact" class="btn">Request Quote</a>
  </div>
</section>

<section id="about" class="section slide-left">
  <h2>About Us</h2>
  <p>Delivering transport excellence across India with precision, safety and reliability.</p>
</section>

<section id="stats" class="section dark slide-right">
  <div class="stat">
    <h2 class="counter" data-target="500">0</h2>
    <p>Deliveries</p>
  </div>
  <div class="stat">
    <h2 class="counter" data-target="120">0</h2>
    <p>Clients</p>
  </div>
  <div class="stat">
    <h2 class="counter" data-target="15">0</h2>
    <p>Years Experience</p>
  </div>
</section>

<section id="contact" class="contact">
  <div class="glass">
    <h2>Contact Us</h2>
    <p>balajiroadlines5@gmail.com</p>
  </div>
</section>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
